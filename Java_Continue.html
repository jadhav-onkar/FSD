<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Java // MCQ Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #14161c;
    --panel: #1b1e26;
    --panel-2: #21242e;
    --gutter: #0f1116;
    --border: #2c303c;
    --text: #dfe2eb;
    --text-dim: #8b90a3;
    --text-faint: #5b5f70;
    --amber: #f2a65a;
    --amber-dim: #a97a44;
    --teal: #4fd1c5;
    --green: #63d987;
    --green-bg: rgba(99,217,135,0.12);
    --red: #f2726b;
    --red-bg: rgba(242,114,107,0.12);
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height:100vh;
  }

  /* ===== Top bar ===== */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 14px 22px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top:0;
    z-index: 50;
    flex-wrap: wrap;
    gap: 10px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    font-family: var(--mono);
  }
  .brand .dot-row{display:flex; gap:6px;}
  .brand .dot{width:10px;height:10px;border-radius:50%;}
  .brand .dot:nth-child(1){background:#f2726b;}
  .brand .dot:nth-child(2){background:#f2a65a;}
  .brand .dot:nth-child(3){background:#63d987;}
  .brand-title{font-weight:700; letter-spacing:0.3px; color:var(--text);}
  .brand-title span{color:var(--amber);}
  .brand-sub{font-size:11px; color:var(--text-dim); margin-top:2px;}

  .stats{
    display:flex;
    align-items:center;
    gap:18px;
    font-family: var(--mono);
    font-size: 13px;
  }
  .stat{display:flex; flex-direction:column; align-items:flex-end;}
  .stat b{font-size:16px; color:var(--text);}
  .stat small{color:var(--text-dim); font-size:10px; text-transform:uppercase; letter-spacing:0.08em;}
  .stat.correct b{color:var(--green);}
  .stat.wrong b{color:var(--red);}
  .progress-wrap{
    width:140px;
    height:6px;
    background:var(--gutter);
    border-radius:4px;
    overflow:hidden;
  }
  .progress-bar{height:100%; background: linear-gradient(90deg, var(--teal), var(--green)); width:0%; transition: width .3s ease;}
  .reset-btn{
    font-family:var(--mono);
    font-size:11px;
    color:var(--text-dim);
    background:transparent;
    border:1px solid var(--border);
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
  }
  .reset-btn:hover{border-color: var(--red); color: var(--red);}

  /* ===== Layout ===== */
  .layout{
    display:grid;
    grid-template-columns: 240px 1fr;
    min-height: calc(100vh - 63px);
  }
  @media (max-width: 860px){
    .layout{grid-template-columns: 1fr;}
    .sidebar{
      order:2;
      max-height: 260px;
    }
  }

  /* ===== Sidebar / gutter ===== */
  .sidebar{
    background: var(--gutter);
    border-right: 1px solid var(--border);
    overflow-y:auto;
    padding: 10px 0;
  }
  .side-label{
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-faint);
    padding: 6px 16px;
  }
  .qnav-grid{
    display:grid;
    grid-template-columns: repeat(5, 1fr);
    gap:6px;
    padding: 4px 12px 16px;
  }
  .qnav-btn{
    font-family: var(--mono);
    font-size: 11px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 5px;
    padding: 6px 0;
    cursor:pointer;
    text-align:center;
    transition: all .15s ease;
  }
  .qnav-btn:hover{border-color: var(--amber-dim); color: var(--amber);}
  .qnav-btn.active{background: var(--amber); color:#1b1300; border-color: var(--amber); font-weight:700;}
  .qnav-btn.done-correct{background: var(--green-bg); color: var(--green); border-color: rgba(99,217,135,0.35);}
  .qnav-btn.done-wrong{background: var(--red-bg); color: var(--red); border-color: rgba(242,114,107,0.35);}
  .qnav-btn.active.done-correct, .qnav-btn.active.done-wrong{background:var(--amber); color:#1b1300;}

  /* ===== Main panel ===== */
  .main{
    padding: 26px 32px 60px;
    max-width: 900px;
  }
  .card{
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow:hidden;
    margin-bottom: 22px;
  }
  .card-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--panel-2);
  }
  .qtag{
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-faint);
  }
  .qtag b{color:var(--amber);}
  .type-pill{
    font-family: var(--mono);
    font-size: 10px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    padding: 3px 8px;
    border-radius: 20px;
    border:1px solid var(--border);
    color: var(--text-dim);
  }
  .card-body{padding: 20px;}
  .question-text{
    font-size: 16px;
    line-height:1.55;
    margin: 0 0 14px;
    color: var(--text);
  }
  pre.code-block{
    background: var(--gutter);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    overflow-x:auto;
    font-family: var(--mono);
    font-size: 13px;
    line-height:1.6;
    color: #c9d6e8;
    margin: 0 0 16px;
    white-space: pre;
  }

  .options{display:flex; flex-direction:column; gap:10px;}
  .option{
    display:flex;
    align-items:flex-start;
    gap:12px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 9px;
    background: var(--panel-2);
    cursor:pointer;
    transition: all .12s ease;
    font-family: var(--mono);
    font-size: 13.5px;
    line-height:1.5;
  }
  .option:hover{border-color: var(--amber-dim);}
  .option .key{
    flex-shrink:0;
    width: 24px;
    height:24px;
    border-radius:6px;
    background: var(--gutter);
    border: 1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
    color: var(--text-dim);
    text-transform:uppercase;
    font-size:11px;
  }
  .option.correct{
    background: var(--green-bg);
    border-color: var(--green);
  }
  .option.correct .key{background: var(--green); color:#062a13; border-color:var(--green);}
  .option.incorrect{
    background: var(--red-bg);
    border-color: var(--red);
  }
  .option.incorrect .key{background: var(--red); color:#2b0805; border-color:var(--red);}
  .option.disabled{cursor:default;}
  .option .mark{margin-left:auto; font-family:var(--sans); font-size:12px; font-weight:700;}
  .option.correct .mark{color:var(--green);}
  .option.incorrect .mark{color:var(--red);}

  .feedback{
    margin-top:14px;
    padding: 12px 14px;
    border-radius:8px;
    font-size: 13px;
    display:none;
    font-family: var(--sans);
  }
  .feedback.show{display:block;}
  .feedback.ok{background:var(--green-bg); color:var(--green); border:1px solid rgba(99,217,135,0.3);}
  .feedback.bad{background:var(--red-bg); color:var(--red); border:1px solid rgba(242,114,107,0.3);}

  .note-box{
    margin-top:12px;
    padding: 10px 14px;
    border-left: 3px solid var(--amber);
    background: rgba(242,166,90,0.08);
    font-size: 12.5px;
    color: var(--text-dim);
    border-radius: 0 6px 6px 0;
    display:none;
  }
  .note-box.show{display:block;}
  .note-box b{color:var(--amber);}

  .reveal-btn, .check-btn{
    font-family: var(--mono);
    font-size: 13px;
    font-weight:600;
    background: var(--amber);
    color: #1b1300;
    border:none;
    padding: 10px 18px;
    border-radius: 7px;
    cursor:pointer;
    margin-top: 4px;
  }
  .reveal-btn:hover, .check-btn:hover{filter:brightness(1.08);}
  .reveal-answer{
    margin-top:14px;
    padding: 14px 16px;
    background: var(--gutter);
    border: 1px solid var(--border);
    border-left: 3px solid var(--teal);
    border-radius: 0 8px 8px 0;
    font-size: 13.5px;
    line-height:1.6;
    display:none;
  }
  .reveal-answer.show{display:block;}
  .reveal-answer b{color:var(--teal);}

  .nav-buttons{
    display:flex;
    justify-content:space-between;
    gap: 10px;
    margin-top: 6px;
  }
  .nav-btn{
    font-family: var(--mono);
    font-size:13px;
    background: var(--panel-2);
    border:1px solid var(--border);
    color: var(--text);
    padding: 10px 16px;
    border-radius:7px;
    cursor:pointer;
  }
  .nav-btn:hover{border-color:var(--amber-dim); color:var(--amber);}
  .nav-btn:disabled{opacity:0.35; cursor:default;}

  /* console log */
  .console{
    background: var(--gutter);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    height: 160px;
    overflow-y:auto;
    margin-top: 6px;
  }
  .console .line{margin-bottom:4px; white-space:pre-wrap;}
  .console .line .prompt{color:var(--amber-dim);}
  .console .line.ok{color:var(--green);}
  .console .line.bad{color:var(--red);}
  .console-title{
    font-family:var(--mono);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--text-faint);
    margin: 26px 0 8px;
  }

  ::-webkit-scrollbar{width:8px; height:8px;}
  ::-webkit-scrollbar-track{background:var(--gutter);}
  ::-webkit-scrollbar-thumb{background:var(--border); border-radius:4px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="dot-row"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div>
      <div class="brand-title">java<span>Quiz</span>.exe</div>
      <div class="brand-sub">113-question MCQ console &middot; answer-checked build</div>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><b id="statAnswered">0</b><small>Answered</small></div>
    <div class="stat correct"><b id="statCorrect">0</b><small>Correct</small></div>
    <div class="stat wrong"><b id="statWrong">0</b><small>Wrong</small></div>
    <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <button class="reset-btn" id="resetBtn">reset progress</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="side-label">Questions</div>
    <div class="qnav-grid" id="qnavGrid"></div>
  </div>

  <div class="main">
    <div class="card">
      <div class="card-head">
        <div class="qtag">Q<b id="qNum">1</b> / <span id="qTotal">113</span></div>
        <div class="type-pill" id="qType">single</div>
      </div>
      <div class="card-body" id="qBody">
        <!-- injected per-question -->
      </div>
    </div>

    <div class="nav-buttons">
      <button class="nav-btn" id="prevBtn">&larr; Previous</button>
      <button class="nav-btn" id="nextBtn">Next &rarr;</button>
    </div>

    <div class="console-title">build log</div>
    <div class="console" id="consoleLog"></div>
  </div>
</div>

<script>
(function(){
  const RAW = document.getElementById('questionData').textContent;
  const QUESTIONS = JSON.parse(RAW);
  const TOTAL = QUESTIONS.length;
  const STORAGE_KEY = 'javaQuizProgressV1';

  let state = loadState();
  let currentIndex = 0;

  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw) return JSON.parse(raw);
    }catch(e){}
    return { results: {}, log: [] };
    // results[num] = { status: 'correct'|'wrong', picked: [...] }
  }

  function saveState(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
  }

  function escapeHtml(str){
    if(str === null || str === undefined) return '';
    return String(str)
      .replaceAll('&','&amp;')
      .replaceAll('<','&lt;')
      .replaceAll('>','&gt;');
  }

  function logLine(text, cls){
    state.log.push({text, cls: cls||''});
    if(state.log.length > 200) state.log.shift();
    saveState();
    renderConsole();
  }

  function renderConsole(){
    const el = document.getElementById('consoleLog');
    el.innerHTML = state.log.map(l => {
      return `<div class="line ${l.cls}"><span class="prompt">&gt;</span> ${escapeHtml(l.text)}</div>`;
    }).join('');
    el.scrollTop = el.scrollHeight;
  }

  function buildNav(){
    const grid = document.getElementById('qnavGrid');
    grid.innerHTML = '';
    QUESTIONS.forEach((q, i) => {
      const btn = document.createElement('button');
      btn.className = 'qnav-btn';
      btn.textContent = q.num;
      btn.dataset.index = i;
      btn.addEventListener('click', () => { currentIndex = i; render(); });
      grid.appendChild(btn);
    });
    refreshNav();
  }

  function refreshNav(){
    const buttons = document.querySelectorAll('.qnav-btn');
    buttons.forEach((btn) => {
      const i = parseInt(btn.dataset.index, 10);
      const q = QUESTIONS[i];
      btn.classList.remove('active','done-correct','done-wrong');
      const res = state.results[q.num];
      if(res){
        btn.classList.add(res.status === 'correct' ? 'done-correct' : 'done-wrong');
      }
      if(i === currentIndex) btn.classList.add('active');
    });
  }

  function updateStats(){
    const answered = Object.keys(state.results).length;
    let correct = 0, wrong = 0;
    Object.values(state.results).forEach(r => { if(r.status === 'correct') correct++; else wrong++; });
    document.getElementById('statAnswered').textContent = answered;
    document.getElementById('statCorrect').textContent = correct;
    document.getElementById('statWrong').textContent = wrong;
    const pct = TOTAL ? Math.round((answered / TOTAL) * 100) : 0;
    document.getElementById('progressBar').style.width = pct + '%';
  }

  function normalizeSet(arr){
    return arr.map(x => String(x).toLowerCase()).sort().join(',');
  }

  function render(){
    const q = QUESTIONS[currentIndex];
    document.getElementById('qNum').textContent = q.num;
    document.getElementById('qTotal').textContent = TOTAL;
    document.getElementById('qType').textContent = q.type === 'multi' ? 'multi-select' : (q.type === 'reveal' ? 'open answer' : 'single-select');

    const body = document.getElementById('qBody');
    let html = '';
    html += `<p class="question-text">${escapeHtml(q.question)}</p>`;
    if(q.code){
      html += `<pre class="code-block">${escapeHtml(q.code)}</pre>`;
    }

    const existing = state.results[q.num];

    if(q.type === 'reveal'){
      html += `<button class="reveal-btn" id="actionBtn">${existing ? 'Answer shown' : 'Show answer'}</button>`;
      html += `<div class="reveal-answer ${existing ? 'show' : ''}" id="revealBox"><b>Answer:</b> ${escapeHtml(q.answer)}</div>`;
    } else if(q.type === 'multi'){
      html += `<div class="options" id="optionsWrap">`;
      Object.entries(q.options).forEach(([key, text]) => {
        html += `<label class="option" data-key="${key}">
          <span class="key"><input type="checkbox" value="${key}" style="accent-color:#f2a65a; width:14px; height:14px;"></span>
          <span>${escapeHtml(text)}</span>
        </label>`;
      });
      html += `</div>`;
      html += `<button class="check-btn" id="actionBtn" style="margin-top:14px;">${existing ? 'Checked' : 'Check answer'}</button>`;
      html += `<div class="feedback" id="feedbackBox"></div>`;
    } else {
      html += `<div class="options" id="optionsWrap">`;
      Object.entries(q.options).forEach(([key, text]) => {
        html += `<div class="option" data-key="${key}">
          <span class="key">${escapeHtml(key)}</span>
          <span>${escapeHtml(text)}</span>
        </div>`;
      });
      html += `</div>`;
      html += `<div class="feedback" id="feedbackBox"></div>`;
    }

    if(q.note){
      html += `<div class="note-box ${existing ? 'show' : ''}" id="noteBox"><b>Note:</b> ${escapeHtml(q.note)}</div>`;
    }

    body.innerHTML = html;

    // wire interactions
    if(q.type === 'single'){
      wireSingle(q, existing);
    } else if(q.type === 'multi'){
      wireMulti(q, existing);
    } else if(q.type === 'reveal'){
      wireReveal(q, existing);
    }

    document.getElementById('prevBtn').disabled = currentIndex === 0;
    document.getElementById('nextBtn').disabled = currentIndex === TOTAL - 1;

    refreshNav();
    updateStats();
  }

  function markOptionColors(q, answerSet){
    const opts = document.querySelectorAll('#optionsWrap .option');
    opts.forEach(opt => {
      const key = opt.dataset.key.toLowerCase();
      if(answerSet.has(key)){
        opt.classList.add('correct');
      }
    });
  }

  function wireSingle(q, existing){
    const correctKey = String(q.answer).toLowerCase();
    const opts = document.querySelectorAll('#optionsWrap .option');
    const feedback = document.getElementById('feedbackBox');

    function lockAndShow(pickedKey){
      opts.forEach(o => o.classList.add('disabled'));
      const answerSet = new Set([correctKey]);
      markOptionColors(q, answerSet);
      if(pickedKey !== correctKey){
        const pickedEl = document.querySelector(`#optionsWrap .option[data-key="${pickedKey}"]`);
        if(pickedEl) pickedEl.classList.add('incorrect');
      }
      const isCorrect = pickedKey === correctKey;
      feedback.classList.add('show', isCorrect ? 'ok' : 'bad');
      feedback.textContent = isCorrect
        ? 'Correct! ' + q.options[correctKey]
        : `Not quite. Correct answer: ${correctKey.toUpperCase()}) ${q.options[correctKey]}`;
      const noteBox = document.getElementById('noteBox');
      if(noteBox) noteBox.classList.add('show');
    }

    if(existing){
      lockAndShow(existing.picked[0]);
      return;
    }

    opts.forEach(opt => {
      opt.addEventListener('click', () => {
        if(opt.classList.contains('disabled')) return;
        const key = opt.dataset.key.toLowerCase();
        const isCorrect = key === correctKey;
        state.results[q.num] = { status: isCorrect ? 'correct' : 'wrong', picked: [key] };
        saveState();
        lockAndShow(key);
        logLine(`Q${q.num}: picked ${key.toUpperCase()} -> ${isCorrect ? 'CORRECT' : 'WRONG (correct: ' + correctKey.toUpperCase() + ')'}`, isCorrect ? 'ok' : 'bad');
        refreshNav();
        updateStats();
      });
    });
  }

  function wireMulti(q, existing){
    const correctSet = new Set(q.answer.map(a => String(a).toLowerCase()));
    const btn = document.getElementById('actionBtn');
    const feedback = document.getElementById('feedbackBox');
    const checkboxes = document.querySelectorAll('#optionsWrap input[type="checkbox"]');

    function lockAndShow(pickedArr){
      checkboxes.forEach(cb => cb.disabled = true);
      const opts = document.querySelectorAll('#optionsWrap .option');
      const pickedSet = new Set(pickedArr.map(x => x.toLowerCase()));
      opts.forEach(opt => {
        const key = opt.dataset.key.toLowerCase();
        if(correctSet.has(key)) opt.classList.add('correct');
        else if(pickedSet.has(key)) opt.classList.add('incorrect');
      });
      const isCorrect = normalizeSet([...pickedSet]) === normalizeSet([...correctSet]);
      feedback.classList.add('show', isCorrect ? 'ok' : 'bad');
      const correctLabels = [...correctSet].map(k => k.toUpperCase()).join(', ');
      feedback.textContent = isCorrect
        ? `Correct! (${correctLabels})`
        : `Not quite. Correct answers: ${correctLabels}`;
      const noteBox = document.getElementById('noteBox');
      if(noteBox) noteBox.classList.add('show');
      btn.textContent = 'Checked';
    }

    if(existing){
      lockAndShow(existing.picked);
      return;
    }

    btn.addEventListener('click', () => {
      const picked = [...checkboxes].filter(cb => cb.checked).map(cb => cb.value.toLowerCase());
      if(picked.length === 0) return;
      const isCorrect = normalizeSet(picked) === normalizeSet([...correctSet]);
      state.results[q.num] = { status: isCorrect ? 'correct' : 'wrong', picked };
      saveState();
      lockAndShow(picked);
      logLine(`Q${q.num}: picked ${picked.join('+').toUpperCase()} -> ${isCorrect ? 'CORRECT' : 'WRONG (correct: ' + [...correctSet].join('+').toUpperCase() + ')'}`, isCorrect ? 'ok' : 'bad');
      refreshNav();
      updateStats();
    });
  }

  function wireReveal(q, existing){
    const btn = document.getElementById('actionBtn');
    const box = document.getElementById('revealBox');

    function reveal(){
      box.classList.add('show');
      const noteBox = document.getElementById('noteBox');
      if(noteBox) noteBox.classList.add('show');
      btn.textContent = 'Answer shown';
    }

    if(existing){ reveal(); return; }

    btn.addEventListener('click', () => {
      state.results[q.num] = { status: 'correct', picked: ['revealed'] };
      saveState();
      reveal();
      logLine(`Q${q.num}: answer revealed`, '');
      refreshNav();
      updateStats();
    });
  }

  document.getElementById('prevBtn').addEventListener('click', () => {
    if(currentIndex > 0){ currentIndex--; render(); }
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    if(currentIndex < TOTAL - 1){ currentIndex++; render(); }
  });
  document.getElementById('resetBtn').addEventListener('click', () => {
    if(confirm('Reset all progress? This clears every answered question.')){
      state = { results: {}, log: [] };
      saveState();
      logLine('progress reset', '');
      render();
    }
  });

  document.getElementById('qTotal').textContent = TOTAL;
  buildNav();
  logLine(`loaded ${TOTAL} questions. good luck.`, '');
  render();
})();

</script>

</body>
</html>
