<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Stack Prep — Quiz Deck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f2ede1;
    --paper-card:#fbf8f1;
    --ink:#20221f;
    --ink-soft:#5b5a52;
    --rail:var(--paper-card);
    --rail-ink:var(--ink);
    --rail-line: rgba(32,34,31,0.12);
    --rail-hover: rgba(32,34,31,0.05);
    --rail-active: rgba(32,34,31,0.08);
    --line: #d8d0bd;
    --ok:#1f8a4c;
    --ok-bg:#e2f3e6;
    --bad:#c23b3b;
    --bad-bg:#fbe6e3;
    --amber:#b8860b;

    --c-html:#e34c26;
    --c-css:#264de4;
    --c-js:#c99a00;
    --c-react:#0e93b4;
    --c-angular:#c3002f;
    --c-spring:#3f7d20;
    --c-mongo:#13aa52;
    --c-devops:#1f6fb2;
    --c-micro:#8a4fbf;
    --c-java:#c9750a;
    --c-ts:#2b5fad;
    --c-git:#77492a;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  body::before{
    content:"";
    position:fixed; inset:0;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(32,34,31,0.05) 1px, transparent 0);
    background-size: 22px 22px;
    pointer-events:none;
    z-index:0;
  }

  .mono{font-family:'JetBrains Mono', monospace;}

  /* ---------- layout ---------- */
  .app{
    display:grid;
    grid-template-columns: 250px 1fr;
    align-items:stretch;
    min-height:100vh;
    position:relative;
    z-index:1;
  }

  /* ---------- rail / index tabs ---------- */
  .rail{
    background:var(--rail);
    color:var(--rail-ink);
    padding:28px 0 28px 0;
    border-right:1px solid var(--line);
    position:sticky;
    top:0;
    align-self:start;
    height:100vh;
    overflow-y:auto;
    scrollbar-width:none;      /* Firefox */
    -ms-overflow-style:none;   /* old Edge/IE */
  }
  .rail::-webkit-scrollbar{ display:none; } /* Chrome/Safari */
  .rail-brand{
    padding:0 22px 22px 22px;
    border-bottom:1px solid var(--rail-line);
    margin-bottom:14px;
  }
  .rail-brand .kicker{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--ink-soft);
  }
  .rail-brand h1{
    font-family:'JetBrains Mono', monospace;
    font-size:20px;
    line-height:1.25;
    margin:6px 0 0 0;
    font-weight:700;
  }
  .rail-score{
    padding:16px 22px 20px 22px;
    border-bottom:1px solid var(--rail-line);
    margin-bottom:8px;
  }
  .rail-score .num{
    font-family:'JetBrains Mono', monospace;
    font-size:28px;
    font-weight:800;
  }
  .rail-score .lbl{
    font-size:11px;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:.1em;
    margin-top:2px;
  }
  .rail-score .bar{
    height:6px;
    border-radius:4px;
    background:var(--line);
    margin-top:10px;
    overflow:hidden;
  }
  .rail-score .bar-fill{
    height:100%;
    background:var(--ok);
    width:0%;
    transition:width .35s ease;
  }

  .tab-list{ list-style:none; margin:6px 0 0 0; padding:0; }
  .tab{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 22px;
    cursor:pointer;
    border-left:3px solid transparent;
    transition:background .15s ease, border-color .15s ease;
    font-size:13.5px;
  }
  .tab:hover{ background:var(--rail-hover); }
  .tab.active{
    background:var(--rail-active);
  }
  .tab .swatch{
    width:9px; height:9px; border-radius:2px;
    flex:none;
    box-shadow:0 0 0 2px rgba(0,0,0,0.18) inset;
  }
  .tab .name{ flex:1; }
  .tab .count{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--ink-soft);
  }
  .tab .pill{
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    padding:1px 6px;
    border-radius:20px;
    background:var(--ok-bg);
    color:var(--ok);
    display:none;
  }
  .tab.done .pill{ display:inline-block; }

  .rail-actions{
    padding:18px 22px 0 22px;
  }
  .rail-btn{
    width:100%;
    background:transparent;
    border:1px solid var(--line);
    color:var(--rail-ink);
    font-family:'JetBrains Mono', monospace;
    font-size:11.5px;
    letter-spacing:.05em;
    text-transform:uppercase;
    padding:9px 10px;
    border-radius:6px;
    cursor:pointer;
    margin-bottom:8px;
    transition:all .15s ease;
  }
  .rail-btn:hover{ background:var(--rail-hover); border-color:var(--ink); }

  /* ---------- main ---------- */
  main{
    padding:0 44px 90px 44px;
    max-width:900px;
  }
  .topbar{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:16px;
    margin:0 -44px 26px -44px;
    padding:34px 44px 18px 44px;
    border-bottom:2px solid var(--ink);
    position:sticky;
    top:0;
    z-index:10;
    background:var(--paper);
  }
  .topbar .cat-title{
    font-family:'JetBrains Mono', monospace;
    font-size:30px;
    font-weight:800;
    display:flex;
    align-items:center;
    gap:12px;
  }
  .topbar .cat-title .dot{
    width:14px;height:14px;border-radius:3px;
    box-shadow:0 0 0 3px rgba(0,0,0,0.06);
  }
  .topbar .cat-sub{
    font-size:13px;
    color:var(--ink-soft);
    margin-top:4px;
  }
  .topbar-right{
    display:flex; gap:10px; align-items:center;
  }
  .ghost-btn{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    background:var(--paper-card);
    border:1.5px solid var(--ink);
    color:var(--ink);
    padding:9px 14px;
    border-radius:7px;
    cursor:pointer;
    text-transform:uppercase;
    letter-spacing:.04em;
  }
  .ghost-btn:hover{ background:var(--ink); color:var(--paper-card); }

  /* ---------- card ---------- */
  .card{
    background:var(--paper-card);
    border:1px solid var(--line);
    border-radius:10px;
    margin-bottom:20px;
    box-shadow: 0 1px 0 rgba(32,34,31,0.03);
    position:relative;
    overflow:hidden;
    display:flex;
  }
  .card .tab-strip{
    width:8px;
    flex:none;
  }
  .card-body{
    padding:22px 24px 20px 22px;
    flex:1;
    min-width:0;
  }
  .card-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:14px;
    margin-bottom:12px;
  }
  .qnum{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--ink-soft);
    letter-spacing:.06em;
  }
  .qtext{
    font-size:16px;
    line-height:1.55;
    font-weight:600;
    white-space:pre-wrap;
    margin:2px 0 14px 0;
  }
  .qtext code, .qtext .code-block{
    font-family:'JetBrains Mono', monospace;
    font-size:13.5px;
    font-weight:400;
  }
  .multi-flag{
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--amber);
    border:1px solid var(--amber);
    padding:2px 7px;
    border-radius:20px;
    white-space:nowrap;
  }

  .opts{ list-style:none; margin:0 0 14px 0; padding:0; display:flex; flex-direction:column; gap:8px;}
  .opt{
    display:flex;
    align-items:flex-start;
    gap:10px;
    padding:10px 12px;
    border:1.5px solid var(--line);
    border-radius:8px;
    cursor:pointer;
    background:#fff;
    transition:border-color .12s ease, background .12s ease, transform .06s ease;
    font-size:14.5px;
    line-height:1.45;
  }
  .opt:hover{ border-color:#b7ad92; }
  .opt.selected{ border-color:var(--ink); background:#f4f0e6; }
  .opt input{ margin-top:3px; flex:none; accent-color:var(--ink); }
  .opt .letter{
    font-family:'JetBrains Mono', monospace;
    font-weight:700;
    font-size:12px;
    color:var(--ink-soft);
    flex:none;
    width:16px;
  }

  .card.checked .opt{ cursor:default; }
  .card.checked .opt:hover{ border-color:var(--line); }
  .card.checked .opt.correct{
    border-color:var(--ok);
    background:var(--ok-bg);
  }
  .card.checked .opt.correct .letter{ color:var(--ok); }
  .card.checked .opt.incorrect{
    border-color:var(--bad);
    background:var(--bad-bg);
  }
  .card.checked .opt.incorrect .letter{ color:var(--bad); }
  .card.checked .opt.correct::after{
    content:"✓ correct";
    margin-left:auto;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--ok);
    font-weight:700;
    flex:none;
    padding-top:1px;
  }
  .card.checked .opt.incorrect::after{
    content:"✕ your pick";
    margin-left:auto;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--bad);
    font-weight:700;
    flex:none;
    padding-top:1px;
  }

  .card-foot{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-top:4px;
  }
  .check-btn{
    font-family:'JetBrains Mono', monospace;
    font-size:12.5px;
    font-weight:700;
    background:var(--ink);
    color:var(--paper-card);
    border:none;
    padding:10px 18px;
    border-radius:7px;
    cursor:pointer;
    letter-spacing:.03em;
    text-transform:uppercase;
  }
  .check-btn:disabled{
    background:#ded7c4;
    color:#8a8471;
    cursor:default;
  }
  .result-tag{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    font-weight:700;
    padding:6px 12px;
    border-radius:20px;
    display:none;
  }
  .card.checked.is-correct .result-tag{
    display:inline-block;
    background:var(--ok-bg);
    color:var(--ok);
  }
  .card.checked.is-correct .result-tag::before{ content:"✓ Correct"; }
  .card.checked.is-wrong .result-tag{
    display:inline-block;
    background:var(--bad-bg);
    color:var(--bad);
  }
  .card.checked.is-wrong .result-tag::before{ content:"✕ Incorrect"; }

  .reset-one{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    background:none;
    border:none;
    color:var(--ink-soft);
    text-decoration:underline;
    cursor:pointer;
    padding:0;
    display:none;
  }
  .card.checked .reset-one{ display:inline-block; }

  .note{
    margin-top:12px;
    padding:10px 12px;
    background:#fbf3da;
    border:1px dashed #d8c48a;
    border-radius:8px;
    font-size:12.5px;
    line-height:1.5;
    color:#5b4a12;
    display:none;
  }
  .card.checked .note.has-note{ display:block; }

  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--ink-soft);
  }
  .empty-state .big{
    font-family:'JetBrains Mono', monospace;
    font-size:20px;
    color:var(--ink);
    margin-bottom:8px;
  }

  @media (max-width: 800px){
    .app{ grid-template-columns: 1fr; }
    .rail{ border-right:none; border-bottom:1px solid var(--line); position:static; height:auto; overflow-y:visible; }
    main{ padding:0 18px 70px 18px; }
    .topbar{ margin:0 -18px 26px -18px; padding:24px 18px 18px 18px; }
  }

  a{ color:inherit; }
  ::selection{ background:#dcd2b0; }
</style>
</head>
<body>
<div class="app">
  <nav class="rail">
    <div class="rail-brand">
      <div class="kicker">// prep notes → quiz deck</div>
      <h1>Full Stack<br>Interview Drill</h1>
    </div>
    <div class="rail-score">
      <div class="num"><span id="score-num">0</span> / <span id="score-total">0</span></div>
      <div class="lbl">answered correctly</div>
      <div class="bar"><div class="bar-fill" id="score-bar"></div></div>
    </div>
    <ul class="tab-list" id="tab-list"></ul>
    <div class="rail-actions">
      <button class="rail-btn" id="reset-all">Reset all answers</button>
    </div>
  </nav>

  <main>
    <div class="topbar">
      <div>
        <div class="cat-title"><span class="dot" id="cat-dot"></span><span id="cat-name">Loading…</span></div>
        <div class="cat-sub" id="cat-sub"></div>
      </div>
      <div class="topbar-right">
        <button class="ghost-btn" id="check-all">Check all in view</button>
      </div>
    </div>
    <div id="card-container"></div>
  </main>
</div>

, "java.util.concurrent.Flow.Processor", "All of the above"], "correct": [3], "multi": false, "note": ""}, {"cat": "Core Java", "q": "In Java, which of the following data structure classes CANNOT be type-parameterized?", "opts": ["List", "Set", "Array", "Map"], "correct": [2], "multi": false, "note": ""}, {"cat": "Core Java", "q": "What is the output of this inheritance chain?\nclass First { public First(){ System.out.println(\"F\"); } }\nclass Second extends First { public Second(){ System.out.println(\"S\"); } }\nclass Third extends Second { public Third(){ System.out.println(\"T\"); } }\npublic class TestClass { public static void main(String[] args){ Third c = new Third(); } }", "opts": ["TSF", "T", "F", "FST"], "correct": [3], "multi": false, "note": "Constructors run parent-first: First -> Second -> Third, printing F, S, T."}, {"cat": "Core Java", "q": "Which class is introduced in Java 8 to get the current milliseconds/instant reliably?", "opts": ["Clock", "Current Time", "Date Time", "Time"], "correct": [0], "multi": false, "note": ""}, {"cat": "Core Java", "q": "In Java, which of these class types supports sequential and parallel processing of data?", "opts": ["Queue", "Lambda", "ExecutorService", "Streams"], "correct": [3], "multi": false, "note": ""}, {"cat": "Core Java", "q": "What is the replacement for PermGen space in Java 8?", "opts": ["FixedGen", "Metaspace", "MetaGenspace", "Eden Space"], "correct": [1], "multi": false, "note": ""}, {"cat": "Core Java", "q": "What is the difference between peek() and dequeue() on a Queue?", "opts": ["peek() returns the next item without removing it; dequeue() removes and returns the next item", "Both return the next item without removing it", "Both remove and return the next item", "peek() removes, dequeue() only views"], "correct": [0], "multi": false, "note": ""}, {"cat": "Core Java", "q": "What is the output? int x = 5; System.out.println(x++ + ++x);", "opts": ["10", "11", "12", "13"], "correct": [2], "multi": false, "note": "x++ evaluates to 5 (x becomes 6), then ++x evaluates to 7 (x becomes 7); 5+7=12."}, {"cat": "Core Java", "q": "What is the output? String s1=\"Hello\"; String s2=new String(\"Hello\"); System.out.println(s1==s2);", "opts": ["true", "false", "Compile Error", "null"], "correct": [1], "multi": false, "note": "== compares references; new String() creates a separate object on the heap."}, {"cat": "Core Java", "q": "List<Integer> list=new ArrayList<>(); list.add(1); list.add(2); list.remove(Integer.valueOf(1)); System.out.println(list); \u2014 what prints?", "opts": ["[1, 2]", "[2]", "[]", "Compile Error"], "correct": [1], "multi": false, "note": "remove(Integer) removes by value, not index, so the element '1' is removed."}, {"cat": "Core Java", "q": "static int x=10; ... t.x=20; System.out.println(Test.x); \u2014 what prints?", "opts": ["10", "20", "30", "Compile Error"], "correct": [1], "multi": false, "note": "Static fields are shared; assigning via an instance still updates the single class-level field."}, {"cat": "Core Java", "q": "int[] arr={1,2}; System.out.println(arr[2]); wrapped in try-catch (but not caught here) \u2014 what happens?", "opts": ["Prints 1", "Prints 2", "Throws ArrayIndexOutOfBoundsException", "Prints null"], "correct": [2], "multi": false, "note": ""}, {"cat": "Core Java", "q": "What is the purpose of the 'final' keyword when applied to a method?", "opts": ["Prevents method overriding", "Allows dynamic binding", "Enables garbage collection", "Permits multiple inheritance"], "correct": [0], "multi": false, "note": ""}, {"cat": "Core Java", "q": "Which Java collection class is synchronized by default?", "opts": ["ArrayList", "HashMap", "Vector", "LinkedList"], "correct": [2], "multi": false, "note": ""}, {"cat": "Core Java", "q": "What is the default access modifier for class members in Java?", "opts": ["public", "private", "protected", "package-private (default)"], "correct": [3], "multi": false, "note": ""}, {"cat": "Core Java", "q": "What does the 'transient' keyword do in Java?", "opts": ["Prevents a field from being serialized", "Enables multithreading", "Marks a variable as static", "Allows method overriding"], "correct": [0], "multi": false, "note": ""}, {"cat": "Core Java", "q": "Which interface is used for natural-order sorting of objects (compareTo)?", "opts": ["Comparable", "Comparator", "Serializable", "Cloneable"], "correct": [0], "multi": false, "note": ""}, {"cat": "Core Java", "q": "What is the max theoretical capacity of a Java BlockingQueue if unbounded?", "opts": ["Integer.INFINITY (not a real constant)", "Integer.MAX_VALUE", "BigDecimal.MAX_VALUE", "Long.MAX_VALUE"], "correct": [1], "multi": false, "note": ""}, {"cat": "Core Java", "q": "What is the output? StringJoiner astring = new StringJoiner(\"-\", \"{\", \"}\"); astring.add(\"A\"); astring.add(\"B\"); astring.add(\"C\");", "opts": ["{A-B-C}", "{A}-{B}-{C}", "{-A-}{-B-}{-C-}", "A-B-C"], "correct": [0], "multi": false, "note": ""}, {"cat": "Core Java", "q": "Name the two types of streams in Java 8's Stream API.", "opts": ["Sync and async", "Sequential and parallel", "Random and ordered", "Buffered and unbuffered"], "correct": [1], "multi": false, "note": ""}, {"cat": "Core Java", "q": "Which Java Set implementation is both sorted and synchronized?", "opts": ["TreeSet (sorted, but not synchronized)", "LinkedHashSet", "HashSet", "Collections.synchronizedSortedSet(new TreeSet<>()) \u2014 no single built-in class is both by default"], "correct": [3], "multi": false, "note": "TreeSet gives natural sorting, but is not synchronized; there's no single built-in Set that is both sorted and synchronized out of the box."}, {"cat": "Core Java", "q": "Which Java class has natural sorting implemented (via a self-balancing tree)?", "opts": ["LinkedHashSet", "TreeSet", "HashSet", "ArraySet"], "correct": [1], "multi": false, "note": ""}, {"cat": "Core Java", "q": "In Java 9, are private methods allowed in interfaces?", "opts": ["True", "False"], "correct": [0], "multi": false, "note": ""}, {"cat": "Core Java", "q": "In Java 8, are constructors allowed in interfaces?", "opts": ["True", "False"], "correct": [1], "multi": false, "note": "Interfaces cannot have constructors in Java; only classes can."}, {"cat": "Core Java", "q": "Can the main() method be overridden in Java?", "opts": ["Yes, freely", "No \u2014 it's static, so it can only be redeclared/hidden, not truly overridden", "Only in interfaces", "Only with a different return type"], "correct": [1], "multi": false, "note": ""}, {"cat": "Core Java", "q": "What is the process of calling one constructor from another constructor in the same or parent class called?", "opts": ["Method overloading", "Constructor chaining", "Static binding", "Late binding"], "correct": [1], "multi": false, "note": ""}, {"cat": "Core Java", "q": "What does the 'finally' block guarantee in Java exception handling?", "opts": ["It only runs if an exception occurred", "It runs regardless of whether an exception occurred, and is not mandatory to include", "It replaces the catch block", "It must always be present"], "correct": [1], "multi": false, "note": ""}, {"cat": "TypeScript", "q": "What is the purpose of an interface in TypeScript?", "opts": ["Define class behavior only", "Specify an object's structure/shape", "Create modules", "Handle exceptions"], "correct": [1], "multi": false, "note": ""}, {"cat": "TypeScript", "q": "What is the type of: let x: any;", "opts": ["number", "string", "any", "void"], "correct": [2], "multi": false, "note": ""}, {"cat": "TypeScript", "q": "What does this do? function greet(name: string): string { return `Hello, ${name}`; }", "opts": ["Throws a type error", "Returns a string", "Returns void", "Returns any"], "correct": [1], "multi": false, "note": ""}, {"cat": "TypeScript", "q": "Which keyword is used to extend a class in TypeScript?", "opts": ["implements", "extends", "super", "interface"], "correct": [1], "multi": false, "note": ""}, {"cat": "TypeScript", "q": "How do you define an optional property in a TypeScript interface?", "opts": ["name: string?", "name?: string", "name: string | null", "name: string = null"], "correct": [1], "multi": false, "note": ""}, {"cat": "Git & Tools", "q": "After initializing a new Git repository and creating git-quiz.html, which command will NOT work if issued immediately?", "opts": ["git add git-quiz.html", "git status", "git add .", "git commit -m \"git quiz web file added\" (without staging first)"], "correct": [3], "multi": false, "note": "You must git add the file before committing it, or the commit will have nothing new to commit."}]
</script>
<script>
const QUESTIONS = JSON.parse(document.getElementById('quiz-data').textContent);

const CAT_COLORS = {
  "HTML & CSS": "var(--c-html)",
  "JavaScript": "var(--c-js)",
  "React": "var(--c-react)",
  "Angular": "var(--c-angular)",
  "Spring & Spring Boot": "var(--c-spring)",
  "MongoDB": "var(--c-mongo)",
  "Docker & DevOps": "var(--c-devops)",
  "Microservices": "var(--c-micro)",
  "Core Java": "var(--c-java)",
  "TypeScript": "var(--c-ts)",
  "Git & Tools": "var(--c-git)"
};

const CAT_SUB = {
  "HTML & CSS": "Markup, layout, and Bootstrap fundamentals.",
  "JavaScript": "Core language, scoping, and array/string methods.",
  "React": "Components, hooks, JSX, and the Flux/Redux pattern.",
  "Angular": "Directives, routing, pipes, RxJS, and dependency injection.",
  "Spring & Spring Boot": "MVC, AOP, beans, Spring Data, and Boot starters.",
  "MongoDB": "Documents, queries, indexing, and Spring Data Mongo.",
  "Docker & DevOps": "Containers, CI/CD, Kubernetes, and release patterns.",
  "Microservices": "Architecture patterns, scaling, and DevOps operations.",
  "Core Java": "Collections, streams, concurrency, and code-output puzzles.",
  "TypeScript": "Types, interfaces, and class syntax.",
  "Git & Tools": "Version control basics."
};

const LETTERS = ['A','B','C','D','E','F'];

// assign global ids and group by category, preserving encounter order
const CATS = [];
QUESTIONS.forEach((q, i) => {
  q.id = i;
  if (!CATS.includes(q.cat)) CATS.push(q.cat);
});

const state = {}; // id -> {selected:Set, checked:bool}
QUESTIONS.forEach(q => state[q.id] = {selected: new Set(), checked:false});

let currentCat = CATS[0];

function catCount(cat){ return QUESTIONS.filter(q=>q.cat===cat).length; }
function catCorrectCount(cat){
  return QUESTIONS.filter(q => q.cat===cat && state[q.id].checked && isCorrect(q)).length;
}
function catCheckedCount(cat){
  return QUESTIONS.filter(q => q.cat===cat && state[q.id].checked).length;
}
function isCorrect(q){
  const s = state[q.id];
  if (!s.checked) return false;
  const sel = Array.from(s.selected).sort().join(',');
  const cor = q.correct.slice().sort().join(',');
  return sel === cor;
}

function overallStats(){
  let correct=0, total=QUESTIONS.length;
  QUESTIONS.forEach(q => { if (isCorrect(q)) correct++; });
  return {correct, total};
}

function renderRail(){
  const list = document.getElementById('tab-list');
  list.innerHTML = '';
  CATS.forEach(cat => {
    const li = document.createElement('li');
    li.className = 'tab' + (cat===currentCat ? ' active':'') + (catCheckedCount(cat)===catCount(cat) ? ' done':'');
    li.innerHTML = `
      <span class="swatch" style="background:${CAT_COLORS[cat]||'#999'}"></span>
      <span class="name">${cat}</span>
      <span class="count">${catCorrectCount(cat)}/${catCount(cat)}</span>
      <span class="pill">done</span>
    `;
    li.addEventListener('click', ()=>{ currentCat = cat; renderAll(); window.scrollTo({top:0,behavior:'smooth'}); });
    list.appendChild(li);
  });

  const {correct, total} = overallStats();
  document.getElementById('score-num').textContent = correct;
  document.getElementById('score-total').textContent = total;
  document.getElementById('score-bar').style.width = total ? (100*correct/total)+'%' : '0%';
}

function formatQText(text){
  // wrap fenced-looking code (lines with braces/semicolons) with monospace styling
  return text
    .split('\n')
    .map(line => {
      const codey = /[{};]|console\.|function|class |public |import |System\.out/.test(line);
      const esc = line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return codey ? `<span class="code-block">${esc}</span>` : esc;
    })
    .join('\n');
}

function renderCard(q, index){
  const s = state[q.id];
  const card = document.createElement('div');
  card.className = 'card' + (s.checked ? ' checked' : '') + (s.checked ? (isCorrect(q) ? ' is-correct' : ' is-wrong') : '');
  card.dataset.id = q.id;

  const stripColor = CAT_COLORS[q.cat] || '#999';

  const optsHtml = q.opts.map((opt, i) => {
    const inputType = q.multi ? 'checkbox' : 'radio';
    const selected = s.selected.has(i);
    const isAnsCorrect = q.correct.includes(i);
    let cls = 'opt' + (selected ? ' selected' : '');
    if (s.checked){
      if (isAnsCorrect) cls += ' correct';
      else if (selected) cls += ' incorrect';
    }
    return `
      <li class="${cls}" data-i="${i}">
        <input type="${inputType}" name="q${q.id}" ${selected?'checked':''} ${s.checked?'disabled':''}>
        <span class="letter">${LETTERS[i]}</span>
        <span class="opt-text">${opt.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>
      </li>
    `;
  }).join('');

  card.innerHTML = `
    <div class="tab-strip" style="background:${stripColor}"></div>
    <div class="card-body">
      <div class="card-head">
        <div class="qnum">Q${index+1} · ${q.cat}</div>
        ${q.multi ? '<span class="multi-flag">select all that apply</span>' : ''}
      </div>
      <div class="qtext">${formatQText(q.q)}</div>
      <ul class="opts">${optsHtml}</ul>
      <div class="card-foot">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="check-btn">Check answer</button>
          <button class="reset-one">try again</button>
        </div>
        <span class="result-tag"></span>
      </div>
      ${q.note ? `<div class="note has-note">ℹ︎ ${q.note.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>` : ''}
    </div>
  `;

  // option click
  card.querySelectorAll('.opt').forEach(optEl => {
    optEl.addEventListener('click', () => {
      if (s.checked) return;
      const i = parseInt(optEl.dataset.i, 10);
      if (q.multi){
        if (s.selected.has(i)) s.selected.delete(i);
        else s.selected.add(i);
      } else {
        s.selected.clear();
        s.selected.add(i);
      }
      // re-render just this card's option states
      updateCardOptions(card, q);
    });
  });

  const checkBtn = card.querySelector('.check-btn');
  checkBtn.addEventListener('click', () => {
    if (s.selected.size === 0) return;
    s.checked = true;
    renderAll();
  });

  const resetBtn = card.querySelector('.reset-one');
  resetBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    s.checked = false;
    s.selected.clear();
    renderAll();
  });

  return card;
}

function updateCardOptions(card, q){
  const s = state[q.id];
  card.querySelectorAll('.opt').forEach(optEl => {
    const i = parseInt(optEl.dataset.i, 10);
    optEl.classList.toggle('selected', s.selected.has(i));
    optEl.querySelector('input').checked = s.selected.has(i);
  });
}

function renderCards(){
  const container = document.getElementById('card-container');
  container.innerHTML = '';
  const qs = QUESTIONS.filter(q => q.cat === currentCat);
  if (qs.length === 0){
    container.innerHTML = `<div class="empty-state"><div class="big">Nothing here yet</div>Pick a topic from the left.</div>`;
    return;
  }
  qs.forEach((q, i) => container.appendChild(renderCard(q, i)));
}

function renderTopbar(){
  document.getElementById('cat-name').textContent = currentCat;
  document.getElementById('cat-dot').style.background = CAT_COLORS[currentCat] || '#999';
  document.getElementById('cat-sub').textContent =
    (CAT_SUB[currentCat] || '') + `  ·  ${catCorrectCount(currentCat)}/${catCount(currentCat)} correct in this topic`;
}

function renderAll(){
  renderRail();
  renderTopbar();
  renderCards();
}

document.getElementById('check-all').addEventListener('click', () => {
  QUESTIONS.filter(q => q.cat === currentCat).forEach(q => {
    if (state[q.id].selected.size > 0) state[q.id].checked = true;
  });
  renderAll();
});

document.getElementById('reset-all').addEventListener('click', () => {
  if (!confirm('Reset every answer across all topics?')) return;
  QUESTIONS.forEach(q => { state[q.id].checked = false; state[q.id].selected.clear(); });
  renderAll();
});

renderAll();
</script>
</body>
