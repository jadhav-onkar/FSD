<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spring & Spring Boot Quiz</title>
<style>
  :root{
    --bg:#0f1420; --card:#171d2c; --card2:#1e2536; --text:#e8ebf3; --muted:#9aa4bd;
    --accent:#6c8cff; --good:#31c48d; --bad:#f05252; --warn:#f5b83d; --border:#2a3348;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(180deg,#0b0f18,#0f1420 300px);color:var(--text);}
  header{position:sticky;top:0;z-index:10;background:rgba(15,20,32,.92);backdrop-filter:blur(6px);
    border-bottom:1px solid var(--border);padding:14px 18px;}
  h1{margin:0 0 4px;font-size:20px;}
  .sub{color:var(--muted);font-size:13px;}
  .controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;align-items:center;}
  select,button{background:var(--card2);color:var(--text);border:1px solid var(--border);
    border-radius:8px;padding:8px 12px;font-size:13px;cursor:pointer;}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
  button:hover{filter:brightness(1.12);}
  #score{font-weight:700;color:var(--accent);}
  main{max-width:880px;margin:0 auto;padding:18px;}
  .section{margin-top:26px;}
  .section h2{font-size:16px;color:var(--accent);border-bottom:1px solid var(--border);padding-bottom:6px;}
  .q{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin:12px 0;}
  .qtext{font-weight:600;margin-bottom:10px;line-height:1.4;}
  .qnum{color:var(--muted);font-weight:500;margin-right:4px;}
  .opt{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:8px;
    border:1px solid var(--border);margin-bottom:6px;cursor:pointer;transition:.15s;background:var(--card2);}
  .opt:hover{border-color:var(--accent);}
  .opt input{margin-top:3px;}
  .opt.correct{border-color:var(--good);background:rgba(49,196,141,.12);}
  .opt.wrong{border-color:var(--bad);background:rgba(240,82,82,.12);}
  .opt.disabled{cursor:default;}
  .rowbtns{display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap;}
  .result{font-size:13px;font-weight:600;padding:3px 10px;border-radius:20px;display:none;}
  .result.show{display:inline-block;}
  .result.ok{background:rgba(49,196,141,.15);color:var(--good);}
  .result.no{background:rgba(240,82,82,.15);color:var(--bad);}
  .note{margin-top:8px;font-size:12.5px;color:var(--warn);background:rgba(245,184,61,.09);
    border-left:3px solid var(--warn);padding:8px 10px;border-radius:6px;display:none;}
  .note.show{display:block;}
  .badge{font-size:10.5px;padding:2px 7px;border-radius:20px;background:rgba(245,184,61,.15);
    color:var(--warn);border:1px solid rgba(245,184,61,.4);margin-left:6px;}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:30px 0 50px;}
</style>
</head>
<body>
<header>
  <h1>Spring &amp; Spring Boot Quiz</h1>
  <div class="sub">From Spring_All.pdf + SpringBoot20Questions.pdf — corrected, gap-filled, and interactive.</div>
  <div class="controls">
    <button class="primary" onclick="checkAll()">Check all answers</button>
    <button onclick="resetAll()">Reset</button>
    <button onclick="revealAll()">Reveal all correct answers</button>
    <span id="score">Score: 0 / 0</span>
  </div>
</header>
<main id="app"></main>
<footer>⚠ = an answer was missing, wrong, or corrupted in the source PDF and has been corrected/filled in — see the note under that question.</footer>

const app = document.getElementById('app');
let qCounter = 0;
DATA.forEach((section, si) => {
  const sec = document.createElement('div');
  sec.className = 'section';
  sec.innerHTML = `<h2>${section.title}</h2>`;
  section.qs.forEach((item, qi) => {
    qCounter++;
    const id = `s${si}q${qi}`;
    const box = document.createElement('div');
    box.className = 'q';
    box.dataset.id = id;
    box.dataset.answer = item.a;
    const unverified = item.a === -1;
    box.innerHTML = `
      <div class="qtext"><span class="qnum">${qCounter}.</span>${item.q}${item.note ? '<span class="badge">⚠ corrected</span>' : ''}</div>
      <div class="opts">
        ${item.o.map((opt,oi)=>`
          <label class="opt" data-oi="${oi}">
            <input type="radio" name="${id}" value="${oi}" ${unverified?'disabled':''}>
            <span>${opt}</span>
          </label>`).join('')}
      </div>
      <div class="rowbtns">
        <button onclick="checkOne('${id}')" ${unverified?'disabled':''}>Check</button>
        <span class="result" id="res-${id}"></span>
      </div>
      ${item.note ? `<div class="note" id="note-${id}">${item.note}</div>` : ''}
    `;
    sec.appendChild(box);
  });
  app.appendChild(sec);
});

function checkOne(id){
  const box = document.querySelector(`.q[data-id="${id}"]`);
  const correct = parseInt(box.dataset.answer);
  const selected = box.querySelector(`input[name="${id}"]:checked`);
  const resEl = document.getElementById(`res-${id}`);
  const note = document.getElementById(`note-${id}`);
  box.querySelectorAll('.opt').forEach(o=>{
    o.classList.remove('correct','wrong');
    o.classList.add('disabled');
    const oi = parseInt(o.dataset.oi);
    if(oi === correct) o.classList.add('correct');
  });
  if(!selected){
    resEl.textContent = 'Pick an answer first';
    resEl.className = 'result show no';
    box.querySelectorAll('.opt').forEach(o=>o.classList.remove('disabled'));
    return;
  }
  const sel = parseInt(selected.value);
  if(sel === correct){
    resEl.textContent = 'Correct ✓';
    resEl.className = 'result show ok';
  } else {
    resEl.textContent = 'Incorrect ✗';
    resEl.className = 'result show no';
    box.querySelector(`.opt[data-oi="${sel}"]`).classList.add('wrong');
  }
  if(note) note.classList.add('show');
  updateScore();
}

function checkAll(){
  document.querySelectorAll('.q').forEach(box=>{
    const id = box.dataset.id;
    if(box.dataset.answer !== '-1') checkOne(id);
  });
}

function revealAll(){
  document.querySelectorAll('.q').forEach(box=>{
    const correct = parseInt(box.dataset.answer);
    box.querySelectorAll('.opt').forEach(o=>{
      o.classList.add('disabled');
      const oi = parseInt(o.dataset.oi);
      if(oi === correct) o.classList.add('correct');
    });
    const note = box.querySelector('.note');
    if(note) note.classList.add('show');
  });
}

function resetAll(){
  document.querySelectorAll('.q').forEach(box=>{
    box.querySelectorAll('.opt').forEach(o=>o.classList.remove('correct','wrong','disabled'));
    box.querySelectorAll('input[type=radio]').forEach(i=>i.checked=false);
    const res = box.querySelector('.result');
    if(res){ res.classList.remove('show','ok','no'); res.textContent=''; }
    const note = box.querySelector('.note');
    if(note) note.classList.remove('show');
  });
  updateScore();
}

function updateScore(){
  let total = 0, correctCount = 0;
  document.querySelectorAll('.q').forEach(box=>{
    if(box.dataset.answer === '-1') return;
    const res = box.querySelector('.result');
    if(res && res.classList.contains('show')){
      total++;
      if(res.classList.contains('ok')) correctCount++;
    }
  });
  document.getElementById('score').textContent = `Score: ${correctCount} / ${total}`;
}
</script>
</body>
