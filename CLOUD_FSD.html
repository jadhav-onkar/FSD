<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud FSD Dumps — Practice Quiz</title>
<style>
  :root{
    --ink:#1b2430;
    --paper:#f6f4ef;
    --panel:#ffffff;
    --line:#e2ded3;
    --accent:#2f5d50;
    --accent-soft:#e4ece9;
    --good:#1f7a4d;
    --good-bg:#e5f5ec;
    --bad:#b3261e;
    --bad-bg:#fbe9e7;
    --muted:#6b7280;
    font-family: 'Iowan Old Style','Palatino Linotype',Georgia,serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family: Georgia, 'Times New Roman', serif;
    -webkit-font-smoothing:antialiased;
  }
  .layout{
    display:flex;
    min-height:100vh;
  }
  /* Sidebar */
  .sidebar{
    width:280px;
    flex-shrink:0;
    background:var(--panel);
    border-right:1px solid var(--line);
    padding:24px 18px;
    position:sticky;
    top:0;
    height:100vh;
    overflow-y:auto;
  }
  .brand{
    font-family: 'Trebuchet MS', sans-serif;
    letter-spacing:.08em;
    text-transform:uppercase;
    font-size:11px;
    color:var(--muted);
    margin-bottom:4px;
  }
  .brand-title{
    font-size:22px;
    font-weight:700;
    margin:0 0 18px 0;
    line-height:1.2;
  }
  .section-nav-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
    padding:10px 12px;
    border-radius:8px;
    cursor:pointer;
    margin-bottom:4px;
    font-family: 'Trebuchet MS', sans-serif;
    font-size:13.5px;
    color:var(--ink);
    transition:background .15s ease;
  }
  .section-nav-item:hover{ background:var(--accent-soft); }
  .section-nav-item.active{ background:var(--accent); color:#fff; }
  .section-nav-item .count{
    font-size:11px;
    opacity:.75;
    font-variant-numeric: tabular-nums;
  }
  .sidebar-footer{
    margin-top:24px;
    padding-top:16px;
    border-top:1px solid var(--line);
    font-family:'Trebuchet MS', sans-serif;
    font-size:12px;
    color:var(--muted);
  }
  .score-pill{
    display:inline-block;
    margin-top:8px;
    background:var(--accent-soft);
    color:var(--accent);
    padding:4px 10px;
    border-radius:999px;
    font-weight:700;
  }

  /* Main */
  .main{
    flex:1;
    padding:36px 48px 80px;
    max-width:880px;
  }
  .top-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:16px;
    margin-bottom:8px;
  }
  h1.section-title{
    font-size:30px;
    margin:0;
    font-weight:700;
  }
  .section-meta{
    font-family:'Trebuchet MS', sans-serif;
    color:var(--muted);
    font-size:13px;
    margin-bottom:28px;
  }
  .toolbar{
    display:flex;
    gap:10px;
    margin-bottom:28px;
    font-family:'Trebuchet MS', sans-serif;
  }
  button.tool-btn{
    background:var(--panel);
    border:1px solid var(--line);
    padding:8px 14px;
    border-radius:8px;
    font-size:13px;
    cursor:pointer;
    color:var(--ink);
    font-family:'Trebuchet MS', sans-serif;
  }
  button.tool-btn:hover{ background:var(--accent-soft); border-color:var(--accent); }
  button.tool-btn.primary{
    background:var(--accent);
    color:#fff;
    border-color:var(--accent);
  }

  .qcard{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:22px 24px;
    margin-bottom:18px;
  }
  .qnum{
    font-family:'Trebuchet MS', sans-serif;
    font-size:12px;
    color:var(--muted);
    margin-bottom:6px;
  }
  .qtext{
    font-size:17.5px;
    line-height:1.5;
    margin:0 0 16px 0;
    font-weight:700;
  }
  .options{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .opt{
    display:flex;
    align-items:flex-start;
    gap:10px;
    border:1px solid var(--line);
    border-radius:9px;
    padding:10px 12px;
    cursor:pointer;
    font-size:15px;
    line-height:1.4;
    transition:background .12s ease, border-color .12s ease;
  }
  .opt:hover{ border-color:var(--accent); }
  .opt input{ margin-top:3px; accent-color:var(--accent); flex-shrink:0;}
  .opt.correct{ background:var(--good-bg); border-color:var(--good); }
  .opt.incorrect{ background:var(--bad-bg); border-color:var(--bad); }
  .opt-label{ font-family:'Trebuchet MS', sans-serif; font-weight:700; color:var(--muted); flex-shrink:0; }
  .opt.correct .opt-label{ color:var(--good); }
  .opt.incorrect .opt-label{ color:var(--bad); }

  .qfooter{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:14px;
  }
  .check-btn{
    background:var(--accent);
    color:#fff;
    border:none;
    padding:8px 18px;
    border-radius:8px;
    font-family:'Trebuchet MS', sans-serif;
    font-size:13.5px;
    cursor:pointer;
  }
  .check-btn:disabled{ opacity:.4; cursor:default; }
  .verdict{
    font-family:'Trebuchet MS', sans-serif;
    font-size:13px;
    font-weight:700;
  }
  .verdict.good{ color:var(--good); }
  .verdict.bad{ color:var(--bad); }
  .note{
    margin-top:10px;
    font-family:'Trebuchet MS', sans-serif;
    font-size:12.5px;
    color:var(--muted);
    font-style:italic;
  }

  .empty-state{
    text-align:center;
    padding:80px 20px;
    color:var(--muted);
    font-family:'Trebuchet MS', sans-serif;
  }

  @media (max-width: 860px){
    .layout{ flex-direction:column; }
    .sidebar{
      width:100%;
      height:auto;
      position:relative;
      border-right:none;
      border-bottom:1px solid var(--line);
    }
    .main{ padding:24px 20px 60px; max-width:100%; }
  }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">Cloud FSD</div>
    <p class="brand-title">Practice Quiz</p>
    <div id="sectionNav"></div>
    <div class="sidebar-footer">
      Answered: <span id="answeredCount">0</span> / <span id="totalCount">0</span>
      <div class="score-pill">Score: <span id="scoreVal">0</span>/<span id="scoreTotal">0</span></div>
    </div>
  </aside>
  <main class="main">
    <div class="top-row">
      <h1 class="section-title" id="sectionTitle">Section</h1>
    </div>
    <div class="section-meta" id="sectionMeta"></div>
    <div class="toolbar">
      <button class="tool-btn primary" id="checkAllBtn">Check all answers</button>
      <button class="tool-btn" id="revealAllBtn">Reveal all answers</button>
      <button class="tool-btn" id="resetBtn">Reset section</button>
    </div>
    <div id="questionList"></div>
  </main>
</div>

/* === END QUIZ DATA === */

(function(){
  const state = {
    sectionIndex: 0,
    // answers[sectionIndex][questionIndex] = { picked: idx, checked: bool }
    answers: QUIZ_DATA.map(sec => sec.questions.map(() => ({picked:null, checked:false})))
  };

  const sectionNav = document.getElementById('sectionNav');
  const questionList = document.getElementById('questionList');
  const sectionTitle = document.getElementById('sectionTitle');
  const sectionMeta = document.getElementById('sectionMeta');
  const answeredCountEl = document.getElementById('answeredCount');
  const totalCountEl = document.getElementById('totalCount');
  const scoreValEl = document.getElementById('scoreVal');
  const scoreTotalEl = document.getElementById('scoreTotal');

  function totalQuestions(){
    return QUIZ_DATA.reduce((s,sec)=>s+sec.questions.length,0);
  }

  function renderNav(){
    sectionNav.innerHTML = '';
    QUIZ_DATA.forEach((sec, i) => {
      const div = document.createElement('div');
      div.className = 'section-nav-item' + (i===state.sectionIndex ? ' active' : '');
      div.innerHTML = `<span>${sec.name}</span><span class="count">${sec.questions.length}</span>`;
      div.onclick = () => { state.sectionIndex = i; renderNav(); renderSection(); window.scrollTo(0,0); };
      sectionNav.appendChild(div);
    });
  }

  function computeGlobalStats(){
    let answered=0, correct=0, totalChecked=0;
    state.answers.forEach((secAns, si) => {
      secAns.forEach((a, qi) => {
        if(a.picked !== null) answered++;
        if(a.checked){
          totalChecked++;
          if(a.picked === QUIZ_DATA[si].questions[qi].a) correct++;
        }
      });
    });
    return {answered, correct, totalChecked};
  }

  function updateFooterStats(){
    const stats = computeGlobalStats();
    answeredCountEl.textContent = stats.answered;
    totalCountEl.textContent = totalQuestions();
    scoreValEl.textContent = stats.correct;
    scoreTotalEl.textContent = stats.totalChecked;
  }

  function renderSection(){
    const sec = QUIZ_DATA[state.sectionIndex];
    sectionTitle.textContent = sec.name;
    sectionMeta.textContent = sec.questions.length + ' questions';
    questionList.innerHTML = '';

    if(sec.questions.length === 0){
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = 'No questions in this section.';
      questionList.appendChild(empty);
      updateFooterStats();
      return;
    }

    sec.questions.forEach((q, qi) => {
      const card = document.createElement('div');
      card.className = 'qcard';

      const numEl = document.createElement('div');
      numEl.className = 'qnum';
      numEl.textContent = 'Question ' + (qi+1) + ' of ' + sec.questions.length;
      card.appendChild(numEl);

      const qtext = document.createElement('p');
      qtext.className = 'qtext';
      qtext.textContent = q.q;
      card.appendChild(qtext);

      const optsWrap = document.createElement('div');
      optsWrap.className = 'options';

      const letters = ['A','B','C','D','E','F'];
      q.o.forEach((optText, oi) => {
        const label = document.createElement('label');
        label.className = 'opt';
        label.dataset.oi = oi;

        const input = document.createElement('input');
        input.type = 'radio';
        input.name = 'q_' + state.sectionIndex + '_' + qi;
        input.value = oi;
        const ansState = state.answers[state.sectionIndex][qi];
        if(ansState.picked === oi) input.checked = true;
        input.disabled = ansState.checked;
        input.onchange = () => {
          ansState.picked = oi;
          updateFooterStats();
        };

        const letterSpan = document.createElement('span');
        letterSpan.className = 'opt-label';
        letterSpan.textContent = (letters[oi] || oi) + '.';

        const textSpan = document.createElement('span');
        textSpan.textContent = optText;

        label.appendChild(input);
        label.appendChild(letterSpan);
        label.appendChild(textSpan);
        optsWrap.appendChild(label);
      });

      card.appendChild(optsWrap);

      const footer = document.createElement('div');
      footer.className = 'qfooter';

      const checkBtn = document.createElement('button');
      checkBtn.className = 'check-btn';
      checkBtn.textContent = 'Check answer';

      const verdict = document.createElement('span');
      verdict.className = 'verdict';

      footer.appendChild(checkBtn);
      footer.appendChild(verdict);
      card.appendChild(footer);

      if(q.note){
        const noteEl = document.createElement('div');
        noteEl.className = 'note';
        noteEl.textContent = 'Note: ' + q.note;
        card.appendChild(noteEl);
      }

      function applyCheckedState(){
        const ansState = state.answers[state.sectionIndex][qi];
        const opts = optsWrap.querySelectorAll('.opt');
        opts.forEach((optEl) => {
          const oi = parseInt(optEl.dataset.oi, 10);
          optEl.classList.remove('correct','incorrect');
          const inp = optEl.querySelector('input');
          if(ansState.checked){
            inp.disabled = true;
            if(oi === q.a) optEl.classList.add('correct');
            else if(oi === ansState.picked && ansState.picked !== q.a) optEl.classList.add('incorrect');
          } else {
            inp.disabled = false;
          }
        });
        if(ansState.checked){
          checkBtn.disabled = true;
          checkBtn.textContent = 'Checked';
          if(ansState.picked === q.a){
            verdict.textContent = '✓ Correct';
            verdict.className = 'verdict good';
          } else if(ansState.picked === null){
            verdict.textContent = 'No answer selected — correct shown above';
            verdict.className = 'verdict bad';
          } else {
            verdict.textContent = '✗ Incorrect — correct answer highlighted';
            verdict.className = 'verdict bad';
          }
        } else {
          checkBtn.disabled = false;
          checkBtn.textContent = 'Check answer';
          verdict.textContent = '';
        }
      }

      checkBtn.onclick = () => {
        const ansState = state.answers[state.sectionIndex][qi];
        ansState.checked = true;
        applyCheckedState();
        updateFooterStats();
      };

      applyCheckedState();
      questionList.appendChild(card);
    });

    updateFooterStats();
  }

  document.getElementById('checkAllBtn').onclick = () => {
    state.answers[state.sectionIndex].forEach(a => a.checked = true);
    renderSection();
  };
  document.getElementById('revealAllBtn').onclick = () => {
    const sec = QUIZ_DATA[state.sectionIndex];
    state.answers[state.sectionIndex].forEach((a, qi) => {
      a.checked = true;
      if(a.picked === null) a.picked = sec.questions[qi].a;
    });
    renderSection();
  };
  document.getElementById('resetBtn').onclick = () => {
    state.answers[state.sectionIndex] = QUIZ_DATA[state.sectionIndex].questions.map(() => ({picked:null, checked:false}));
    renderSection();
  };

  totalCountEl.textContent = totalQuestions();
  renderNav();
  renderSection();
})();
</script>
